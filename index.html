<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack de Moldes Femininos — Costure em Casa</title>
  <meta name="description" content="1000 moldes de costura prontos para imprimir e usar em casa mesmo sendo iniciante. Acesso imediato, arquivos em PDF, vídeo aulas, e-book e bônus.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --rose:#d4667a;
      --rose-dark:#b04d62;
      --rose-light:#f5d5db;
      --rose-pale:#fdf0f2;
      --cream:#faf7f4;
      --warm:#fff9f9;
      --charcoal:#1e1a1b;
      --mid:#5a4f52;
      --muted:#948689;
      --gold:#c9a84c;
      --gold-light:#f7ecd4;
      --line:#ecdde1;
      --white:#ffffff;
      --shadow-sm:0 2px 12px rgba(180,80,100,.08);
      --shadow-md:0 8px 32px rgba(180,80,100,.12);
      --shadow-lg:0 18px 50px rgba(180,80,100,.16);
      --r-sm:14px;
      --r-md:22px;
      --r-lg:32px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--charcoal);
      line-height:1.65;
      overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{width:100%;max-width:720px;margin:0 auto;padding:0 20px}
    .serif{font-family:'Playfair Display',serif}

    .topbar{
      background:var(--charcoal);
      color:#fff;
      text-align:center;
      font-size:.78rem;
      font-weight:500;
      padding:9px 16px;
      letter-spacing:.04em;
    }
    .topbar span{color:var(--rose-light)}

    .tag{
      display:inline-block;
      background:var(--rose-light);
      color:var(--rose-dark);
      font-size:.72rem;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      padding:5px 14px;
      border-radius:999px;
    }

    .btn{
      display:block;
      width:100%;
      max-width:440px;
      margin:0 auto;
      border:none;
      border-radius:999px;
      padding:18px 28px;
      text-align:center;
      font-weight:700;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      cursor:pointer;
    }
    .btn:hover{transform:translateY(-2px);filter:brightness(1.03)}
    .btn-primary{
      background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);
      color:#fff;
      box-shadow:var(--shadow-md);
      font-size:1rem;
    }
    .btn-outline{
      border:2px solid var(--rose);
      color:var(--rose);
      background:transparent;
      font-size:.95rem;
      padding:14px 22px;
    }

    .trustline{
      text-align:center;
      font-size:.78rem;
      color:var(--muted);
      margin-top:12px;
    }

    .hero{
      background:var(--warm);
      padding:52px 0 48px;
      position:relative;
      overflow:hidden;
      text-align:center;
    }
    .hero:before,
    .hero:after{
      content:'';
      position:absolute;
      border-radius:50%;
      pointer-events:none;
      background:radial-gradient(circle,var(--rose-light) 0%,transparent 70%);
      opacity:.5;
    }
    .hero:before{width:320px;height:320px;top:-90px;right:-80px}
    .hero:after{width:360px;height:360px;bottom:-120px;left:-100px;opacity:.35}
    .hero .container{position:relative;z-index:2}
    .hero-icon{
      width:74px;height:74px;
      border-radius:50%;
      margin:0 auto 22px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--rose-light),#fbe8ec);
      box-shadow:var(--shadow-sm);
      font-size:2rem;
    }
    .hero h1{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.7rem,5vw,2.5rem);
      line-height:1.18;
      margin:18px 0 16px;
      color:var(--charcoal);
    }
    .hero h1 em{font-style:italic;color:var(--rose)}
    .hero-sub{
      max-width:500px;
      margin:0 auto 24px;
      font-size:1rem;
      color:var(--mid);
    }
    .hero-support{
      max-width:520px;
      margin:0 auto 26px;
      font-size:.92rem;
      color:var(--mid);
    }

    .price-badge{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      background:var(--rose-pale);
      border:1.5px solid var(--rose-light);
      border-radius:var(--r-md);
      padding:16px 28px;
      margin-bottom:24px;
    }
    .price-badge .old-price{
      font-size:.82rem;
      color:var(--muted);
      text-decoration:line-through;
    }
    .price-badge .new-price{
      font-family:'Playfair Display',serif;
      font-size:2.2rem;
      line-height:1;
      color:var(--rose-dark);
      margin:2px 0 5px;
    }
    .price-badge .price-note{
      font-size:.77rem;
      color:var(--mid);
      font-weight:500;
    }

    .hero-links{
      margin-top:16px;
      font-size:.8rem;
      color:var(--muted);
      text-align:center;
    }
    .hero-links a{
      color:var(--rose);
      text-decoration:underline;
      font-weight:700;
    }

    .hero-trust{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px 18px;
      margin-top:22px;
    }
    .hero-trust span{
      font-size:.78rem;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .hero-trust .dot{
      width:7px;height:7px;border-radius:50%;background:var(--rose);flex-shrink:0;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent,var(--rose-light),transparent);
    }

    section{padding:56px 0}
    .section-label{text-align:center;margin-bottom:10px}
    .section-title{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.35rem,4vw,2rem);
      line-height:1.24;
      text-align:center;
      margin-bottom:12px;
      color:var(--charcoal);
    }
    .section-sub{
      max-width:510px;
      margin:0 auto 34px;
      text-align:center;
      color:var(--mid);
      font-size:.95rem;
    }

    .benefits-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media(min-width:560px){
      .benefits-grid{grid-template-columns:repeat(3,1fr)}
    }
    .benefit-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:20px 14px;
      text-align:center;
      box-shadow:var(--shadow-sm);
    }
    .benefit-icon{font-size:1.75rem;display:block;margin-bottom:8px}
    .benefit-title{font-size:.86rem;font-weight:600;color:var(--charcoal);line-height:1.35}

    .preview{
      background:var(--warm);
    }
    .preview-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .preview-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 16px;
      box-shadow:var(--shadow-sm);
    }
    .preview-card h3{
      font-size:1rem;
      margin-bottom:6px;
      color:var(--charcoal);
    }
    .preview-card p{
      font-size:.82rem;
      color:var(--mid);
      line-height:1.45;
      margin-bottom:8px;
    }
    .preview-size{
      display:inline-block;
      background:var(--rose-pale);
      color:var(--rose-dark);
      font-size:.72rem;
      font-weight:700;
      padding:5px 10px;
      border-radius:999px;
    }
    .preview-foot{
      margin-top:16px;
      text-align:center;
      font-size:.86rem;
      color:var(--mid);
      font-weight:500;
    }

    .receive{
      background:var(--cream);
    }
    .receive-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--r-md);
      padding:26px 22px;
      box-shadow:var(--shadow-sm);
    }
    .receive-list{
      list-style:none;
      display:grid;
      gap:10px;
    }
    .receive-list li{
      display:flex;
      gap:10px;
      align-items:flex-start;
      font-size:.92rem;
      color:var(--mid);
      padding:4px 0;
    }
    .receive-list .check{
      color:var(--rose);
      font-weight:700;
      flex-shrink:0;
    }

    .testimonials{
      background:var(--rose-pale);
    }
    .testimonials-grid{
      display:grid;
      gap:14px;
    }
    @media(min-width:800px){
      .testimonials-grid{grid-template-columns:1fr 1fr}
    }
    .testimonial-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px 18px;
      box-shadow:var(--shadow-sm);
      position:relative;
    }
    .testimonial-card .quote{
      position:absolute;
      top:14px;
      left:16px;
      font-size:1.8rem;
      color:var(--rose-light);
      font-family:'Playfair Display',serif;
      line-height:1;
      pointer-events:none;
    }
    .stars{
      font-size:.95rem;
      color:var(--gold);
      margin-bottom:10px;
      letter-spacing:.04em;
      position:relative;
      z-index:1;
    }
    .testimonial-text{
      font-size:.9rem;
      color:var(--mid);
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }
    .testimonial-author{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .avatar{
      width:38px;height:38px;border-radius:50%;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;
      font-size:.86rem;
      flex-shrink:0;
    }
    .testimonial-name{
      font-size:.84rem;
      font-weight:700;
      color:var(--charcoal);
    }
    .testimonial-role{
      font-size:.75rem;
      color:var(--muted);
    }

    .faq{
      background:#fff;
    }
    .faq-list{
      display:grid;
      gap:12px;
    }
    .faq-item{
      background:var(--warm);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px 18px;
      box-shadow:var(--shadow-sm);
    }
    .faq-q{
      font-weight:700;
      font-size:.92rem;
      color:var(--charcoal);
      margin-bottom:6px;
    }
    .faq-a{
      font-size:.88rem;
      color:var(--mid);
    }

    .plans{
      background:var(--warm);
    }
    .urgency{
      text-align:center;
      font-size:.82rem;
      color:#7a5f20;
      background:var(--gold-light);
      border:1px solid #ead8a8;
      border-radius:14px;
      padding:10px 14px;
      margin:0 auto 24px;
      max-width:520px;
      font-weight:600;
    }

    .plans-grid{
      display:grid;
      gap:16px;
      align-items:start;
    }
    @media(min-width:640px){
      .plans-grid{grid-template-columns:1fr 1fr}
    }

    .plan-card{
      background:#fff;
      border:2px solid var(--line);
      border-radius:24px;
      padding:28px 22px;
      text-align:center;
      position:relative;
      box-shadow:var(--shadow-sm);
    }
    .plan-card.featured{
      border-color:var(--rose);
      background:linear-gradient(160deg,#fff 62%,var(--rose-pale) 100%);
      box-shadow:var(--shadow-md);
    }
    .plan-badge{
      position:absolute;
      top:-13px;
      left:50%;
      transform:translateX(-50%);
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:#
